<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>การติดตั้ง วพม.3</title>
    <link rel="manifest" href="https://github.io">
    <meta name="theme-color" content="#0066cc">
    <link rel="icon" type="image/png" href="https://github.io">
    <link rel="apple-touch-icon" href="https://github.io">
    
    <script>
        // โค้ดส่งต่อตัวเปิดวาร์ป: ถ้าผู้ใช้กดเปิดจาก Icon แอปบนหน้าจอมือถือ (Standalone) 
        // ระบบจะดีดหน้าจอไปที่ลิงก์เป้าหมายของคุณทันทีอัตโนมัติ!
        if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
            window.location.replace("https://surl.li/jxxitn");
        }
    </script>

    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px 20px; background-color: #f5f5f5; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; max-width: 400px; }
        #btnInstall { display: none; background-color: #0066cc; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 5px; cursor: pointer; margin-top: 20px; font-weight: bold; width: 100%; }
        #btnInstall:hover { background-color: #004c99; }
        .ios-info { display: none; background-color: #e6f2ff; padding: 15px; border-radius: 5px; margin-top: 20px; font-size: 14px; color: #333; text-align: left; }
    </style>
</head>
<body>

    <div class="card">
        <h1>ยินดีต้อนรับสู่ระบบ วพม.3</h1>
        <p>ขณะนี้ระบบพร้อมใช้งานแล้ว</p>
        
        <!-- ปุ่มติดตั้งสำหรับ Android / PC -->
        <button id="btnInstall">➕ คลิกที่นี่เพื่อติดตั้งแอป วพม.3</button>
        
        <!-- คำแนะนำสำหรับ iPhone -->
        <div id="iosPrompt" class="ios-info">
            💡 <strong>วิธีติดตั้งสำหรับ iPhone (Safari):</strong><br>
            1. กดปุ่ม <strong>แชร์ (Share รูปกล่องพร้อมลูกศรชี้ขึ้น)</strong> ด้านล่างจอ<br>
            2. เลื่อนลงแล้วเลือก <strong>"เพิ่มไปยังหน้าจอโฮม" (Add to Home Screen)</strong>
        </div>
    </div>

    <script>
        // ลงทะเบียน Service Worker ตามปกติ
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('https://github.io')
                    .then(reg => console.log('Service Worker OK'))
                    .catch(err => console.error('Service Worker Error', err));
            });
        }

        // ตัวดักจับปุ่มกดติดตั้งสำหรับ Android/PC
        let deferredPrompt;
        const btnInstall = document.getElementById('btnInstall');
        const iosPrompt = document.getElementById('iosPrompt');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            btnInstall.style.display = 'block'; // แสดงปุ่มติดตั้ง
        });

        btnInstall.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') { console.log('User installed PWA'); }
                deferredPrompt = null;
                btnInstall.style.display = 'none';
            }
        });

        // ตรวจสอบหน้าจอ iOS
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
        if (isIOS && !isStandalone) {
            iosPrompt.style.display = 'block'; // แสดงวิธีทำบน iPhone
        }
    </script>
</body>
</html>
