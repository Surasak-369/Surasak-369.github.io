<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>การติดตั้ง วพม.3</title>

    <!-- 1. เชื่อมต่อไฟล์ manifest.json ที่ถูกต้อง -->
    <link rel="manifest" href="./manifest.json">

    <!-- 2. กำหนด Theme Color สำหรับแถบบนมือถือ -->
    <meta name="theme-color" content="#0066cc">

    <!-- 3. เชื่อมต่อไอคอนสำหรับแสดงบนหน้าจอ -->
    <link rel="icon" type="image/png" href="./pem3-192.png">
    <link rel="apple-touch-icon" href="./pem3-192.png">
</head>
<body>

    <h1>ยินดีต้อนรับสู่ระบบ วพม.3</h1>
    <p>ขณะนี้ระบบพร้อมใช้งานและรองรับการติดตั้งเป็นแอป (PWA) แล้ว</p>

    <!-- 4. โค้ดเปิดใช้งาน Service Worker (sw.js) -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker ลงทะเบียนสำเร็จ:', reg.scope))
                    .catch(err => console.error('Service Worker ลงทะเบียนล้มเหลว:', err));
            });
        }
    </script>
</body>
</html>
